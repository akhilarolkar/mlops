# docker-compose.yml
version: '3.8'

services:
  api:
    build: .
    # We only expose the port to the internal Docker network, not the host machine
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    ports:
      # Map port 80 on your laptop to port 80 on the Nginx container
      - "80:80"
    volumes:
      # Mount our custom config into the Nginx container as read-only
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api